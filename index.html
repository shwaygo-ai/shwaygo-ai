<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShwayGo | Splash Screen</title>
    
    <style>
        /* 1. الإعدادات العامة للصفحة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. حاوية الشعار */
        .splash-wrapper {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. تنسيق شعار شويجو الرئيسي */
        .logo-img {
            width: 300px; /* يمكن تعديل الحجم من هنا بسهولة */
            height: auto;
            display: block;
            user-select: none;
        }

        /* 4. النقطة الحمراء (تأثير التسجيل Recording) */
        .pulse-dot {
            position: absolute;
            /* الإحداثيات الأساسية - سنعدلها بالملي متر لاحقاً */
            bottom: 22%; 
            right: 38%; 
            width: 22px;
            height: 22px;
            background-color: #ff0000;
            border-radius: 50%;
            z-index: 10;
            /* تفعيل النبض 4 مرات */
            animation: shwaygo-pulse 1s ease-in-out 4;
        }

        /* 5. تعريف حركة النبض */
        @keyframes shwaygo-pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(255, 0, 0, 0);
            }
            50% {
                transform: scale(1.35);
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(255, 0, 0, 0);
            }
        }
    </style>
</head>
<body>

    <div class="splash-wrapper">
        <img src="logo.jpg?v=5" alt="ShwayGo Logo" class="logo-img">
        
        <div class="pulse-dot"></div>
    </div>

</body>
</html>
