<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShwayGo | Splash Screen</title>
    
    <style>
        /* 1. الإعدادات العامة للصفحة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* خلفية بيضاء صافية */
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 2. حاوية الشعار (أساسية لضبط التداخل) */
        .splash-wrapper {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. تنسيق شعار شويجو الرئيسي (بما فيه النقطة الثابتة) */
        .logo-img {
            width: 300px; /* يمكن تعديل الحجم من هنا بسهولة */
            height: auto;
            display: block;
            user-select: none;
        }

        /* 4. النقطة الحمراء (النبض) - موزونة لتركب فوق القديمة */
        .pulse-overlay {
            position: absolute;
            
            /* الإحداثيات الدقيقة (بالنسبة المئوية) لتطبق فوق النقطة القديمة */
            /* إذا كانت بعيدة قليلاً، غير هذه الأرقام بالأجزاء من المئة */
            bottom: 24.3%; /* المسافة من الأسفل */
            right: 48.5%; /* المسافة من اليمين */
            
            /* حجم النقطة (يجب أن يطابق النقطة القديمة تماماً) */
            width: 21px; 
            height: 21px;
            
            background-color: #ff0000; /* أحمر فاتح زاهي */
            border-radius: 50%;
            z-index: 10;
            
            /* تأثير النبض 4 مرات */
            animation: shwaygo-pulse 1s ease-in-out 4;
        }

        /* 5. تعريف حركة النبض */
        @keyframes shwaygo-pulse {
            0% {
                transform: scale(1);
                opacity: 0.9; /* شفافية خفيفة في البداية */
                box-shadow: 0 0 0 rgba(255, 0, 0, 0);
            }
            50% {
                transform: scale(1.3); /* تكبير لتغطية القديمة */
                opacity: 1; /* تصبح ساطعة */
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            }
            100% {
                transform: scale(1);
                opacity: 0.9;
                box-shadow: 0 0 0 rgba(255, 0, 0, 0);
            }
        }
    </style>
</head>
<body>

    <div class="splash-wrapper">
        <img src="logo.jpg?v=7" alt="ShwayGo Logo" class="logo-img">
        
        <div class="pulse-overlay"></div>
    </div>

</body>
</html>
